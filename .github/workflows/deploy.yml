name: Deploy
on:
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - run: npm ci --legacy-peer-deps
      - run: npm publish --provenance --access public
